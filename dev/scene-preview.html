<!DOCTYPE html>
<!-- Dev harness: boots the safehouse scene directly (no save, no UI) so it can
     be screenshotted headlessly. Not linked from the game. -->
<html lang="en">
<head>
<meta charset="utf-8">
<title>scene preview</title>
<style>
  html, body { margin: 0; height: 100%; background: #04070d; overflow: hidden; }
  #scene { position: absolute; inset: 0; width: 100%; height: 100%; }
</style>
</head>
<body>
<canvas id="scene"></canvas>
<script type="module">
  import { SafehouseScene } from '../js/scene.js';
  // ?bg=path&calx=&caly=&caltw=&cal — test/calibrate a painted backdrop
  const q = new URLSearchParams(location.search);
  const bg = q.get('bg');
  window.__scene = new SafehouseScene(document.getElementById('scene'), {
    accent: '#38bdf8',
    initial: 'Z',
    portrait: '../assets/portraits/zen.png',
    onCaption: () => {},
    backdrop: bg ? {
      src: bg,
      origin: { x: +(q.get('calx') ?? 1024), y: +(q.get('caly') ?? 330) },
      tileW: +(q.get('caltw') ?? 118),
      calibrate: q.has('cal'),
    } : undefined,
  });
  // ?walk — start a walk shortly after load, for screenshotting the gait
  if (location.search.includes('walk')) {
    setTimeout(() => {
      const s = window.__scene;
      s.path = s.findPath({ x: 5, y: 5 }, { x: 9, y: 6 }) || [];
    }, 500);
  }
</script>
</body>
</html>

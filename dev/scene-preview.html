<!DOCTYPE html>
<!-- Dev harness: boots the safehouse scene directly (no save, no UI) so it can
     be screenshotted headlessly. Not linked from the game. -->
<html lang="en">
<head>
<meta charset="utf-8">
<title>scene preview</title>
<style>
  html, body { margin: 0; height: 100%; background: #04070d; overflow: hidden; }
  #scene { position: absolute; inset: 0; width: 100%; height: 100%; }
</style>
</head>
<body>
<canvas id="scene"></canvas>
<script type="module">
  import { SafehouseScene } from '../js/scene.js';
  import { OPERATIVES } from '../js/data.js';
  // ?op=zen|socrates|jackal|hemlock — figure/portrait/accent per operative
  // ?bg=path&calx=&caly=&caltw=&cal — test/calibrate a painted backdrop
  const q = new URLSearchParams(location.search);
  const bg = q.get('bg');
  const op = OPERATIVES[q.get('op')] ?? OPERATIVES.zen;
  window.__scene = new SafehouseScene(document.getElementById('scene'), {
    accent: op.accent,
    initial: op.name[0],
    portrait: '../' + op.portrait,
    figure: op.id,
    onCaption: () => {},
    backdrop: bg ? {
      src: bg,
      origin: { x: +(q.get('calx') ?? 1024), y: +(q.get('caly') ?? 330) },
      tileW: +(q.get('caltw') ?? 118),
      calibrate: q.has('cal'),
    } : undefined,
  });
  // ?walk — start a walk shortly after load, for screenshotting the gait
  if (location.search.includes('walk')) {
    setTimeout(() => {
      const s = window.__scene;
      s.path = s.findPath({ ...s.player }, { x: 9, y: 6 }) || [];
    }, 500);
  }
  // ?tap=x,y — dispatch a tap on a grid cell (e.g. an object) after load
  const tap = q.get('tap');
  if (tap) {
    setTimeout(() => {
      const s = window.__scene;
      const [tx, ty] = tap.split(',').map(Number);
      const rect = s.canvas.getBoundingClientRect();
      const p = s.iso(tx + 0.5, ty + 0.5);
      s.canvas.dispatchEvent(new PointerEvent('pointerdown', {
        clientX: rect.left + p.x, clientY: rect.top + p.y, bubbles: true,
      }));
    }, 500);
  }
  // surface captions in the DOM so headless --dump-dom can assert on them
  const cap = document.createElement('div');
  cap.id = 'cap';
  cap.style.display = 'none';
  document.body.appendChild(cap);
  window.__scene.onCaption = (t) => { cap.textContent = t || ''; };
</script>
</body>
</html>
